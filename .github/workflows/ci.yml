name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run test:smoke

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

  acceptance:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install agent CLIs
        run: npm install -g @google/gemini-cli@0.41.2 opencode-ai@1.14.41

      - name: Install glow
        # TMUX-051 makes glow a hard launcher requirement and TTMUX-050
        # adds a real-glow acceptance probe; without this step the launcher
        # and glow acceptance suites silently self-skip per their broadened
        # skip clauses and CI passes with rotted coverage. ubuntu-latest
        # ships tmux but not glow.
        run: |
          curl -fsSL -o /tmp/glow.deb \
            https://github.com/charmbracelet/glow/releases/download/v2.1.2/glow_2.1.2_amd64.deb
          sudo dpkg -i /tmp/glow.deb
          glow --version

      - name: Run acceptance tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: npm run test:acceptance
