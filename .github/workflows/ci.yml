name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run test:package

      - run: npm run test:smoke

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

  distributable:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install exact agent CLIs
        run: npm install -g @google/gemini-cli@0.50.0 @moonshot-ai/kimi-code@0.27.0 opencode-ai@1.17.18

      - name: Verify distributable
        run: npm run test:distributable

  acceptance:
    if: github.event_name == 'push'
    needs: [ci, distributable]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Install agent CLIs
        run: npm install -g @google/gemini-cli@0.50.0 @moonshot-ai/kimi-code@0.27.0 opencode-ai@1.17.18

      - name: Verify agent CLI targets
        run: node scripts/verify-agent-targets.mjs

      - name: Install attached-client driver
        # Real-tmux mouse/key acceptance probes drive an attached client via
        # expect. Without it, those probes self-skip and CI can miss tmux
        # status/message regressions such as WheelUpPane parser errors.
        run: |
          sudo apt-get update
          sudo apt-get install -y expect
          expect -v

      - name: Install glow
        # TMUX-051 makes glow a hard launcher requirement and TTMUX-050
        # adds a real-glow acceptance probe; without this step the launcher
        # and glow acceptance suites silently self-skip per their broadened
        # skip clauses and CI passes with rotted coverage. ubuntu-latest
        # ships tmux but not glow.
        run: |
          curl -fsSL -o /tmp/glow.deb \
            https://github.com/charmbracelet/glow/releases/download/v2.1.2/glow_2.1.2_amd64.deb
          sudo dpkg -i /tmp/glow.deb
          glow --version

      - name: Configure Kimi acceptance credentials
        env:
          KIMI_CODE_CONFIG_TOML_B64: ${{ secrets.KIMI_CODE_CONFIG_TOML_B64 }}
          KIMI_CODE_CREDENTIALS_JSON_B64: ${{ secrets.KIMI_CODE_CREDENTIALS_JSON_B64 }}
        run: |
          set -euo pipefail
          : "${KIMI_CODE_CONFIG_TOML_B64:?missing KIMI_CODE_CONFIG_TOML_B64 secret}"
          : "${KIMI_CODE_CREDENTIALS_JSON_B64:?missing KIMI_CODE_CREDENTIALS_JSON_B64 secret}"
          kimi_acceptance_home="$RUNNER_TEMP/kimi-code-acceptance"
          install -d -m 0700 "$kimi_acceptance_home/credentials"
          printf '%s' "$KIMI_CODE_CONFIG_TOML_B64" \
            | base64 --decode > "$kimi_acceptance_home/config.toml"
          printf '%s' "$KIMI_CODE_CREDENTIALS_JSON_B64" \
            | base64 --decode > "$kimi_acceptance_home/credentials/kimi-code.json"
          chmod 0600 \
            "$kimi_acceptance_home/config.toml" \
            "$kimi_acceptance_home/credentials/kimi-code.json"
          printf 'CLIGENT_KIMI_ACCEPTANCE_HOME=%s\n' \
            "$kimi_acceptance_home" >> "$GITHUB_ENV"

      - name: Run acceptance tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CODEX_API_KEY: ${{ secrets.CODEX_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        run: npm run test:acceptance
