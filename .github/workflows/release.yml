name: Release

on:
  push:
    tags: ['v[0-9]*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Upgrade npm for trusted-publisher OIDC support
        run: npm install -g npm@11.8.0

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - run: npm test

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version into a file. Writing to a
          # file (not GITHUB_OUTPUT) keeps the body opaque to later steps —
          # `gh release create --notes-file` reads it verbatim, so backticks,
          # `$()`, and other shell-meaningful chars in the changelog cannot
          # be interpreted as commands when the release is created.
          awk -v ver="$VERSION" '
            /^## \[/ { if (found) exit; if ($0 == "## [" ver "]" || index($0, "## [" ver "] -")) found=1; next }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if ! [ -s /tmp/release-notes.md ] || ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No release notes found for version $VERSION in CHANGELOG.md"
            exit 1
          fi

      - run: npm publish --provenance --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
